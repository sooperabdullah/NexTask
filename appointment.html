    <header>
        <h1> Schedule an Appointment </h1>
    </header>
   
    <div class="formimage"> 
        <div class="appointment-form">
            <form action="/submit-appointment" method="post">
                
                <!-- Contact Information Section -->
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required placeholder="Please enter your name...">
                </div>
        
                <div class="form-group">
                    <label for="contact">Contact No:</label>
                    <input type="text" id="contact" name="contact" required placeholder="Please enter your contact number...">
                </div>
        
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="Please enter your email...">
                </div>
        
                <div class="form-group">
                    <label for="contact-method">Preferred Contact Method:</label>
                    <select id="contact-method" name="contact-method" required>
                        <option value="phone">Phone</option>
                        <option value="email">Email</option>
                    </select>
                </div>
        
                <!-- Service Selection Section -->
                <div class="form-group">
                    <label for="service">Select a Service:</label>
                    <select id="service" name="service" required>
                        <option value="plumbing">Plumbing</option>
                        <option value="woodwork">Woodwork</option>
                        <option value="electrical">Wiring</option>
                        <option value="painting">Painting</option>
                        <option value="Welding">Welding</option>
                    </select>
                </div>
        
                <!-- Job Description Section -->
                <div class="form-group">
                    <label for="description">Describe the Job You Want To Be Done:</label>
                    <textarea id="description" name="description" rows="4" required placeholder="Please enter the description of your job..."></textarea>
                </div>
        
                <!-- Preferred Date Section -->
                <div class="form-group">
                    <label for="date">Preferred Date:</label>
                    <input type="date" id="date" name="date" required>
                </div>
        
                <!-- Preferred Time Section -->
                <div class="form-group">
                    <label for="time">Preferred Time:</label>
                    <input type="time" id="time" name="time" required>
                </div>
        
                <!-- Local Information Section -->
                <div class="form-group">
                    <label for="address">Address:</label>
                    <input type="text" id="address" name="address" required placeholder="Please enter your address...">
                </div>
        
                <!-- Payment Options Section -->
                <div class="form-group checkbox">
                    <label for="payment-methods">Preferred Payment Method:</label>
                    <label><input type="radio" name="payment" value="credit"> Credit Card </label>
                    <label><input type="radio" name="payment" value="cash"> Cash </label>
                </div>
        
                <!-- Terms and Conditions Section -->
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="radio" name="terms" required> I accept the Terms and Conditions and Privacy Policy 
                    </label>
                </div>
        
                <!-- Schedule Button -->
                <button type="submit" class="submit-btn">Schedule Appointment</button>
            </form>
            </div>
            <img src="pics/appimage.png" alt="image" class="image">
    </div>

    <script>
                // Select the necessary DOM elements
const searchContainer = document.querySelector('.search-container');
const searchInput = document.querySelector('.search-input');
const searchIcon = document.querySelector('.fa-search');

// Add a click event listener to the search icon
searchIcon.addEventListener('click', () => {
  // Toggle the "active" class on the container
  searchContainer.classList.toggle('active');

  // If active, focus on the input field
  if (searchContainer.classList.contains('active')) {
    searchInput.style.display = "inline-block";
    searchInput.focus();
  } else {
    searchInput.style.display = "none";
  }
});
    </script>
